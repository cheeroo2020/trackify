# trackify config
#
# - Scrapers marked `enabled: true` will run. Stubs are disabled by default.
# - For console retailers we pin specific PDP URLs (consoles change rarely).
# - ON sneakers auto-discover from on.com/en-au PLPs (filtered to US M8).
# - Sister retailers (Foot Locker / JD / Platypus / Hype / Iconic / Rebel)
#   stay stubbed until you fill in the scraper.

alerting:
  drop_pct_threshold: 5.0  # also alerts on new all-time low regardless of %

sneakers:
  target_size_label: "US M8"  # mens US 8

retailers:
  # ---------- ON sneakers ----------
  on_au:
    enabled: true
    max_products: 80  # cap PDP fetches per run

  the_iconic:
    enabled: false  # stub

  foot_locker_au:
    enabled: true
    max_products: 40  # cap PDP fetches; FL stocks ~20-30 mens On models

  jd_sports_au:
    enabled: false  # stub

  platypus:
    enabled: false  # stub

  hype_dc:
    enabled: false  # stub

  rebel:
    enabled: true
    max_products: 30  # only a handful are server-rendered on /brands/on

  # ---------- consoles ----------
  eb_games:
    enabled: false  # 403s from GitHub Actions IPs; needs proxy. Stub for now.

  jb_hifi:
    enabled: true
    urls:
      # Verified live 2026-05-12 via Shopify suggest API.
      # If a fetch 404s in future, look up the current handle at:
      #   https://www.jbhifi.com.au/search/suggest.json?q=<query>&resources[type]=product
      # Keep the product_key stable so price history carries over.
      ps5/slim-disc: "https://www.jbhifi.com.au/products/ps5-playstation-5-slim-console"
      ps5/slim-digital: "https://www.jbhifi.com.au/products/ps5-playstation-5-slim-digital-console-825gb"
      ps5/pro: "https://www.jbhifi.com.au/products/ps5-playstation-5-pro-console"
      xbox/series-x: "https://www.jbhifi.com.au/products/xbox-series-x-1tb-console"
      xbox/series-s-512gb: "https://www.jbhifi.com.au/products/xbox-series-s-512gb-console-1"
      xbox/series-s-1tb: "https://www.jbhifi.com.au/products/xbox-series-s-1tb-console-robot-white"
      xbox/series-x-digital-1tb: "https://www.jbhifi.com.au/products/xbox-series-x-1tb-digital-console-robot-white"

  amazon_au:
    enabled: false  # stub — bot-blocked

  big_w:
    enabled: false  # stub

  harvey_norman:
    enabled: false  # stub

  the_good_guys:
    enabled: true
    urls:
      ps5/slim-disc: "https://www.thegoodguys.com.au/playstation-5-console-slim-166601"
      ps5/slim-digital: "https://www.thegoodguys.com.au/playstation-5-console-digital-edition-slim-171826"
      xbox/series-x: "https://www.thegoodguys.com.au/xbox-series-x-1tb-rrt-00021"
      xbox/series-s-512gb: "https://www.thegoodguys.com.au/xbox-series-s-512gb-rrs-00021"
      xbox/series-s-1tb: "https://www.thegoodguys.com.au/xbox-series-s-1tb-robot-white-ep2-00660"
      xbox/series-x-digital-1tb: "https://www.thegoodguys.com.au/xbox-series-x-1tb-digital-edition-ep2-00718xboxsx1tbde"
